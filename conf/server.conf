# ================================================================
# Mini Web Server v1.2.1 — Nginx-Style Multi-Site Configuration
# ================================================================
#
# This config defines three virtual hosts using server { } blocks.
# Each server block specifies:
#   listen      - IP:port to bind (first block's listen is used for socket)
#   server_name - domain name(s) that match this site (name-based hosting)
#   root        - document root directory
#   access_log  - per-site access log (optional, falls back to global)
#
# An old flat key=value config will still work (auto-detected).
# ================================================================

# ---- Global Settings ----
worker_processes 2
worker_shutdown_timeout_ms 3000
max_connections 256
max_request_bytes 4096
user_file data/users.csv
system_log logs/system.log
access_log logs/access.log
log_max_lines 10000
log_max_roll_files 5

# ---- Default Server: MiniWeb Main Site ----
server {
    listen 0.0.0.0:8080 default_server
    server_name localhost miniserver.local
    root www
    access_log logs/www_access.log
}

# ---- Blog Site (blue/gold theme) ----
server {
    listen 0.0.0.0:8080
    server_name blog.local blog.localhost
    root blog
    access_log logs/blog_access.log
}

# ---- Lab Site (teal/green theme) ----
server {
    listen 0.0.0.0:8080
    server_name lab.local lab.localhost
    root lab
    access_log logs/lab_access.log
}
