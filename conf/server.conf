# ================================================================
# Mini Web Server v1.5 — Nginx-Style Configuration with Route Table
# ================================================================
#
# New in v1.5:
#   - log_level / error_log directives for log level control
#   - location { } blocks for config-based routing
#   - route_table_t with exact + prefix path matching
#   - 405 + Allow header when method not allowed
#   - Startup validation: duplicate rules, unknown handlers → refuse to start
#
# Location syntax:
#   location = /path {           → exact match
#       handler <handler_name>;
#       methods <M1 M2 ...>;
#   }
#
#   location /path/* {            → prefix/wildcard match (captures tail)
#       handler <handler_name>;
#       methods <M1 M2 ...>;
#   }
#
# Available handlers:
#   hello, help, sleep, index, user_list, user_add, user_by_name,
#   user_delete, user_find_index, user_compare, user_compare_verbose,
#   user_simple_find, delete_form, search, blog, static
#
# NOTE: Each (method, path) pair needs its own location block.
#       e.g. GET /users → user_list, POST /users → user_add
# ================================================================

# ---- Global Settings ----
worker_processes 2
worker_shutdown_timeout_ms 3000
max_connections 256
max_request_bytes 4096
user_file data/users_100000_c.csv
system_log logs/system.log
access_log logs/access.log
log_max_lines 10000
log_max_roll_files 5

# ---- v1.5: Log level control ----
# Levels: debug, info, warning, error, none
log_level info
error_log logs/error.log warning

# ---- Default Server: MiniWeb Main Site ----
server {
    listen 0.0.0.0:8080 default_server
    server_name localhost miniserver.local
    root www
    access_log logs/www_access.log
}

# ---- Blog Site (blue/gold theme) ----
server {
    listen 0.0.0.0:8080
    server_name blog.local blog.localhost
    root blog
    access_log logs/blog_access.log
}

# ---- Lab Site (teal/green theme) ----
server {
    listen 0.0.0.0:8080
    server_name lab.local lab.localhost
    root lab
    access_log logs/lab_access.log
}

# ---- User Manager Site (v1.4) ----
server {
    listen 0.0.0.0:8080
    server_name users.localhost
    root search
    access_log logs/search_access.log
}

# ================================================================
# v1.5: Route Table Configuration
#
# Each location block maps a (method, path) pair to a C handler.
# When routes are explicitly configured, ONLY these routes are
# active — the built-in defaults are NOT merged.
#
# To revert to default routes, comment out or remove all location
# blocks below.
# ================================================================

# ---- API endpoints ----
location = /hello {
    handler hello;
    methods GET;
}

location = /help {
    handler help;
    methods GET;
}

location /sleep/* {
    handler sleep;
    methods GET;
}

# ---- User management ----
# GET /users → list all users
location = /users {
    handler user_list;
    methods GET;
}

# POST /users → add a user
location = /users {
    handler user_add;
    methods POST;
}

# GET /users/<name> → find user by name
location /users/* {
    handler user_by_name;
    methods GET;
}

# DELETE /users/<name> → delete user
location /users/* {
    handler user_delete;
    methods DELETE;
}

# GET /users/find-index/<name> → BST index lookup
location /users/find-index/* {
    handler user_find_index;
    methods GET;
}

# GET /users/compare/<name> → compare search methods
location /users/compare/* {
    handler user_compare;
    methods GET;
}

# GET /users/compare-verbose/<name> → compare search (verbose)
location /users/compare-verbose/* {
    handler user_compare_verbose;
    methods GET;
}

# GET /user/<name> → simple find
location /user/* {
    handler user_simple_find;
    methods GET;
}

# ---- Search and forms ----
location = /search {
    handler search;
    methods POST;
}

location = /delete {
    handler delete_form;
    methods POST;
}

# ---- Blog ----
location = /blog {
    handler blog;
    methods GET HEAD;
}

location /blog/* {
    handler blog;
    methods GET HEAD;
}

# ---- Static files and index (lowest priority) ----
location = / {
    handler index;
    methods GET HEAD;
}

location /* {
    handler static;
    methods GET HEAD;
}
